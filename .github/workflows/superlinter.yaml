name: Super-Linter
on: push

permissions:
  contents: read
  statuses: write

jobs:
  super-lint:
    # Name the Job
    name: Lint code base
    # Set the type of machine to run on
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so super-linter can diff against the default branch
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v8.7.0
        env:
          DEFAULT_BRANCH: main
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_LATEX: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
